<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Paw print icon -->
  <g fill="#0066cc">
    <!-- Main pad -->
    <ellipse cx="25" cy="50" rx="12.5" ry="14" />
    
    <!-- Top left toe -->
    <ellipse cx="10" cy="30" rx="7" ry="9" transform="rotate(-15 10 30)" />
    
    <!-- Top middle-left toe -->
    <ellipse cx="18" cy="20" rx="7" ry="9" transform="rotate(-5 18 20)" />
    
    <!-- Top middle-right toe -->
    <ellipse cx="32" cy="20" rx="7" ry="9" transform="rotate(5 32 20)" />
    
    <!-- Top right toe -->
    <ellipse cx="40" cy="30" rx="7" ry="9" transform="rotate(15 40 30)" />
  </g>
  
  <!-- Text -->
  <text x="60" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">Glenugie Kennels</text>
  <text x="60" y="52" font-family="Arial, sans-serif" font-size="11" fill="#666666">Premium Pet Boarding</text>
</svg>
