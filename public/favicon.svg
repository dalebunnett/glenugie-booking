<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#83C8E8"/>
  
  <!-- Paw print in white -->
  <g fill="#ffffff">
    <!-- Main pad -->
    <ellipse cx="64" cy="80" rx="18.5" ry="21.5" />
    
    <!-- Top left toe -->
    <ellipse cx="37" cy="48" rx="10.5" ry="13.5" transform="rotate(-15 37 48)" />
    
    <!-- Top middle-left toe -->
    <ellipse cx="50.5" cy="32" rx="10.5" ry="13.5" transform="rotate(-5 50.5 32)" />
    
    <!-- Top middle-right toe -->
    <ellipse cx="77.5" cy="32" rx="10.5" ry="13.5" transform="rotate(5 77.5 32)" />
    
    <!-- Top right toe -->
    <ellipse cx="91" cy="48" rx="10.5" ry="13.5" transform="rotate(15 91 48)" />
  </g>
</svg>
