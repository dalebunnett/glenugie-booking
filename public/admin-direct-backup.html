<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Admin Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            font-weight: 600;
            color: #555;
        }
        .status-value {
            color: #333;
            font-weight: bold;
        }
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .log {
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 5px;
            line-height: 1.5;
        }
        .log-error {
            color: #ff6b6b;
        }
        .log-success {
            color: #51cf66;
        }
        .log-info {
            color: #74c0fc;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .auth-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Direct Admin Access</h1>
        <p class="subtitle">Bypass cached JavaScript - Direct API access</p>

        <div class="auth-section" id="authSection">
            <h3>Admin Authentication</h3>
            <input type="password" id="passwordInput" placeholder="Enter admin password" />
            <button class="btn-primary" onclick="login()">🔐 Login</button>
        </div>

        <div id="adminPanel" style="display: none;">
            <div class="status" id="status">
                <div class="status-item">
                    <span class="status-label">Authentication:</span>
                    <span class="status-value" id="authStatus">Not logged in</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Bookings in KV:</span>
                    <span class="status-value" id="bookingCount">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Last Action:</span>
                    <span class="status-value" id="lastAction">None</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-info" onclick="checkKV()">🔍 Check KV Storage</button>
                <button class="btn-success" onclick="loadFromGitHub()">📂 Load from GitHub</button>
                <button class="btn-danger" onclick="deleteAll()">🗑️ Delete All Bookings</button>
                <button class="btn-primary" onclick="clearLog()">🧹 Clear Log</button>
            </div>

            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        let sessionToken = localStorage.getItem('admin_session') || '';
        const baseUrl = '/app'; // Adjust if needed

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared', 'info');
        }

        function updateStatus(field, value) {
            document.getElementById(field).textContent = value;
        }

        async function login() {
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                log('Please enter a password', 'error');
                return;
            }

            try {
                log('Attempting login...', 'info');
                const response = await fetch(`${baseUrl}/api/admin/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ password })
                });

                if (!response.ok) {
                    throw new Error('Login failed');
                }

                const data = await response.json();
                sessionToken = data.sessionId;
                localStorage.setItem('admin_session', sessionToken);
                
                log('✅ Login successful!', 'success');
                updateStatus('authStatus', 'Logged in');
                
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                
                // Auto-check KV after login
                await checkKV();
            } catch (error) {
                log(`❌ Login failed: ${error.message}`, 'error');
            }
        }

        async function checkKV() {
            try {
                log('Checking KV storage...', 'info');
                updateStatus('lastAction', 'Checking KV...');
                
                const response = await fetch(`${baseUrl}/api/admin/debug-kv-bookings`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`,
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const count = data.bookingsCount || 0;
                
                updateStatus('bookingCount', count);
                updateStatus('lastAction', 'KV checked');
                log(`✅ KV Storage contains ${count} bookings`, 'success');
                
                if (data.bookings && data.bookings.length > 0) {
                    log(`First booking: ${data.bookings[0].customerName} - ${data.bookings[0].specificSuite || data.bookings[0].accommodationType}`, 'info');
                }
            } catch (error) {
                log(`❌ Failed to check KV: ${error.message}`, 'error');
                updateStatus('lastAction', 'Check failed');
            }
        }

        async function loadFromGitHub() {
            if (!confirm('Load all bookings from GitHub into KV storage?')) {
                return;
            }

            try {
                log('Loading data from GitHub...', 'info');
                updateStatus('lastAction', 'Loading from GitHub...');
                
                const response = await fetch(`${baseUrl}/api/admin/load-production-data`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`,
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }

                const data = await response.json();
                log(`✅ ${data.message}`, 'success');
                updateStatus('lastAction', 'Loaded from GitHub');
                
                // Refresh KV count
                await checkKV();
            } catch (error) {
                log(`❌ Failed to load from GitHub: ${error.message}`, 'error');
                updateStatus('lastAction', 'Load failed');
            }
        }

        async function deleteAll() {
            const confirmation = prompt('Type DELETE to confirm deletion of ALL bookings:');
            if (confirmation !== 'DELETE') {
                log('Deletion cancelled', 'info');
                return;
            }

            try {
                log('Deleting all bookings...', 'info');
                updateStatus('lastAction', 'Deleting all...');
                
                const response = await fetch(`${baseUrl}/api/admin/bookings/delete-all`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`,
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }

                const data = await response.json();
                log(`✅ ${data.message}`, 'success');
                updateStatus('lastAction', 'All deleted');
                updateStatus('bookingCount', '0');
                
                // Verify deletion
                setTimeout(() => checkKV(), 1000);
            } catch (error) {
                log(`❌ Failed to delete: ${error.message}`, 'error');
                updateStatus('lastAction', 'Delete failed');
            }
        }

        // Check if already logged in
        if (sessionToken) {
            log('Found existing session token', 'info');
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            updateStatus('authStatus', 'Logged in (cached)');
            checkKV();
        }
    </script>
</body>
</html>
